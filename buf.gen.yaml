version: v2
plugins:
  - local: protoc-gen-go
    out: .
    opt: paths=source_relative

  - local: protoc-gen-go-grpc
    out: .
    opt: paths=source_relative

  - local: protoc-gen-grpc-gateway
    out: .
    opt: paths=source_relative

inputs:
  - directory: .
    exclude_paths:
      - proto/api/v1/common     # Common API description
      - proto/api/v1/operations # Operations service (AIP-151)
