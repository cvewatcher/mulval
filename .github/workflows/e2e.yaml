name: E2E tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'deploy/go.mod'

      - name: Set up Docker registry
        run: |
          docker network create kind || true
          docker run -d --network kind --name registry -p 5000:5000 registry:3

      - name: Write config file
        run: |
          cat <<EOF > kind-config.yaml
          apiVersion: kind.x-k8s.io/v1alpha4
          kind: Cluster
          containerdConfigPatches:
          - |
            [plugins."io.containerd.grpc.v1.cri".registry]
              config_path = "/etc/containerd/certs.d"

          kubeadmConfigPatches:
          - |
            kind: ClusterConfiguration
            apiServer:
              extraArgs:
                "service-node-port-range": "30000-30005"

          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30000
              hostPort: 30000
            - containerPort: 30001
              hostPort: 30001
            - containerPort: 30002
              hostPort: 30002
            - containerPort: 30003
              hostPort: 30003
            - containerPort: 30004
              hostPort: 30004
            - containerPort: 30005
              hostPort: 30005
          networking:
            disableDefaultCNI: true
          EOF

      - name: Set up Kind cluster
        id: kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # 1.14.0
        with:
          config: kind-config.yaml
          cluster_name: kind
        env:
          KIND_EXPERIMENTAL_DOCKER_NETWORK: kind

      - name: Add the registry config to the nodes
        run: |
          REGISTRY_DIR="/etc/containerd/certs.d/localhost:5000"
          for node in $(kind get nodes); do
            docker exec "${node}" mkdir -p "${REGISTRY_DIR}"
            cat <<EOF | docker exec -i "${node}" cp /dev/stdin "${REGISTRY_DIR}/hosts.toml"
          [host."http://registry:5000"]
          EOF
          done

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: local-registry-hosting
            namespace: kube-public
          data:
            localRegistryHosting.v1: |
              host: "localhost:5000"
              help: "https://kind.sigs.k8s.io/docs/user/local-registry/"
          EOF

      - name: Patch local-path to mount shared filesystem path on the single kind node
        run: |
          # From https://github.com/kubernetes-sigs/kind/issues/1487#issuecomment-2211072952
          kubectl -n local-path-storage patch configmap local-path-config -p '{"data": {"config.json": "{\n\"sharedFileSystemPath\": \"/var/local-path-provisioner\"\n}"}}'

      - name: Setup Cilium as Kind CNI
        run: |
          # See https://docs.cilium.io/en/stable/installation/kind/#install-cilium
          helm repo add cilium https://helm.cilium.io/

          helm install cilium cilium/cilium --version 1.19.3 \
            --namespace kube-system \
            --set image.pullPolicy=IfNotPresent \
            --set ipam.mode=kubernetes

      - name: Setup CNPG
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm upgrade --install cnpg \
            --namespace cnpg-system \
            --create-namespace \
            cnpg/cloudnative-pg

      - name: Export server URL
        id: server
        run: |
          echo "server=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' kind-control-plane)" >> "$GITHUB_OUTPUT"

      - name: Build and push MulVal
        run: |
          docker build -t localhost:5000/cvewatcher/mulval:${{ github.sha }} .
          docker push localhost:5000/cvewatcher/mulval:${{ github.sha }}

      - name: Install Pulumi
        uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
      - name: Prepare environment
        run: |
          pulumi login --local

      - name: Romeo environment
        id: env
        uses: ctfer-io/romeo/environment@c2ebcfb9f305fd5f6ef68858de82507dbac10263 # v0.2.2
        with:
          kubeconfig: ~/.kube/config
          storage-class-name: standard
          pvc-access-mode: ReadWriteOnce
          harden: true

      - name: Run E2E Tests
        run: |
          mkdir coverdir # Directory in which coverage data are exported
          go test -v ./integration/ -run=^Test_I_ -coverprofile=integration.cov -timeout=30m
        env:
          NAMESPACE: ${{ steps.env.outputs.namespace }}
          REGISTRY: localhost:5000
          TAG: ${{ github.sha }}
          ROMEO_CLAIM_NAME: ${{ steps.env.outputs.claim-name }}
          SERVER: ${{ steps.server.outputs.server }}
        working-directory: deploy

      - name: Download Romeo results
        id: download
        if: ${{ always() && steps.env.conclusion == 'success' }}
        uses: ctfer-io/romeo/download@c2ebcfb9f305fd5f6ef68858de82507dbac10263 # v0.2.2
        with:
          server: http://${{ steps.server.outputs.server }}:${{ steps.env.outputs.port }}

      - name: Merge coverage data
        if: ${{ always() && steps.download.conclusion == 'success' }}
        run: |
          # Point back to the actual Go module tested.
          # It cannot be inferred, leading to this highly precise step.
          sed -i 's|^/go/src|github.com/cvewatcher/mulval|' ${{ steps.download.outputs.path }}

          (
            cd deploy
            go tool covdata textfmt -i=coverdir -o=binary.cov
            sed -i 's|^/home/runner/work/mulval/mulval|github.com/cvewatcher/mulval|' binary.cov
          )

          go install go.shabbyrobe.org/gocovmerge/cmd/gocovmerge@fa4f82cfbf4d57c646c1ed0f35002bf1b89fbf7a
          gocovmerge ${{ steps.download.outputs.path }} deploy/integration.cov deploy/binary.cov > e2e.cov

      - name: Upload e2e tests coverage
        if: ${{ always() && steps.download.conclusion == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e.cov
          path: e2e.cov
